<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Quiz Platformasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Kasrlarni chiroyli matematik ko'rinishga keltirish */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            padding: 0 4px;
            font-size: 0.95em;
        }
        .fraction .top {
            border-bottom: 2px solid #374151;
            padding-bottom: 1px;
        }
        .fraction .bottom {
            padding-top: 1px;
        }
        .math-expr {
            font-family: "Times New Roman", Times, serif;
            font-style: italic;
            font-weight: bold;
            background-color: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        /* TELEFONLAR UCHUN MAXSUS MEDIA SOZLAMALARI (RESPONSIVE) */
        @media (max-width: 640px) {
            body {
                padding: 8px;
            }
            /* Karta chetlaridagi bo'shliqlarni ixchamlashtirish */
            .bg-white {
                padding: 1.25rem !important; 
                border-radius: 0.75rem !important;
            }
            /* Savol sarlavhasi shrifti */
            #question-text {
                font-size: 1.05rem !important;
                line-height: 1.5 !important;
                margin-bottom: 1rem !important;
                overflow-x: auto; /* Agar juda uzun formula bo'lsa ekranga sig'ib skrol bo'ladi */
                padding-bottom: 4px;
            }
            /* Variantlar (Tugmalar) shrifti va dizayni */
            #options-container button {
                font-size: 0.95rem !important;
                padding: 0.75rem !important;
                overflow-x: auto;
                white-space: normal; /* Matn pastga tushadi */
            }
            /* Kasrlar shriftini telefon ekraniga moslab biroz kichraytirish */
            .fraction {
                font-size: 0.85em;
            }
            /* Sarlavhalar */
            h1, h2 {
                font-size: 1.5rem !important;
                margin-bottom: 1rem !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div id="setup-card" class="bg-white p-8 rounded-xl shadow-md max-w-md w-full">
        <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">🎓 Quiz Tizimi</h1>
        
        <div class="mb-4">
            <label class="block text-gray-700 font-semibold mb-2">Fanni tanlang:</label>
            <select id="subject-select" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 font-semibold mb-2">Savollar soni:</label>
            <select id="count-select" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="20">20 ta</option>
                <option value="25">25 ta</option>
                <option value="30">30 ta</option>
                <option value="50">50 ta</option>
                <option value="100">100 ta</option>
                <option value="all">Barchasi (Max) 🚀</option>
            </select>
        </div>

        <button onclick="startQuiz()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
            Testni Boshlash 🚀
        </button>
    </div>

    <div id="quiz-card" class="bg-white p-8 rounded-xl shadow-md max-w-2xl w-full hidden">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <span id="quiz-progress" class="text-sm font-semibold text-gray-500">Savol: 1/20</span>
            <button onclick="exitQuiz()" class="text-sm bg-red-100 text-red-600 px-3 py-1 rounded hover:bg-red-200">To'xtatish 🛑</button>
        </div>
        
        <div id="question-text" class="text-lg font-medium text-gray-800 mb-6 leading-relaxed">Savol matni...</div>
        
        <div id="options-container" class="space-y-3">
        </div>
    </div>

    <div id="result-card" class="bg-white p-8 rounded-xl shadow-md max-w-md w-full text-center hidden">
        <h2 class="text-3xl font-bold text-green-600 mb-4">🏁 Yakunlandi!</h2>
        <div class="text-xl mb-2" id="result-score">To'g'ri javoblar: 0 / 0</div>
        <div class="text-2xl font-bold text-indigo-600 mb-6" id="result-ball">Ball: 0/40</div>
        <button onclick="exitQuiz()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition">
            Bosh sahifaga qaytish
        </button>
    </div>

    <script>
        const API_URL = "/api";
        let questions = [];
        let currentIdx = 0;
        let correctAnswers = 0;

        async function loadSubjects() {
            try {
                const res = await fetch(`${API_URL}/subjects`);
                const data = await res.json();
                const select = document.getElementById('subject-select');
                select.innerHTML = data.map(sub => `<option value="${sub}">${sub}</option>`).join('');
            } catch (err) {
                alert("Server bilan ulanishda xato!");
            }
        }

        async function startQuiz() {
            const subject = document.getElementById('subject-select').value;
            const count = document.getElementById('count-select').value;
            
            try {
                const res = await fetch(`${API_URL}/quiz/${subject}?count=${count}`);
                questions = await res.json();
                
                if(questions.length === 0) {
                    alert("Savollar topilmadi!");
                    return;
                }

                currentIdx = 0;
                correctAnswers = 0;

                document.getElementById('setup-card').classList.add('hidden');
                document.getElementById('result-card').classList.add('hidden');
                document.getElementById('quiz-card').classList.remove('hidden');
                
                showQuestion();
            } catch (err) {
                alert("Yuklashda xatolik yuz berdi.");
            }
        }

        function showQuestion() {
            if (currentIdx >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('quiz-progress').innerText = `Savol: ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').innerHTML = q.question;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 border rounded-lg hover:bg-indigo-50 transition duration-150 focus:outline-none block leading-relaxed";
                btn.innerHTML = option;
                btn.onclick = () => checkAnswer(idx, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIdx, buttonElement) {
            const q = questions[currentIdx];
            const container = document.getElementById('options-container');
            
            Array.from(container.children).forEach(btn => btn.disabled = true);

            if (selectedIdx === q.correct) {
                correctAnswers++;
                buttonElement.classList.remove('hover:bg-indigo-50');
                buttonElement.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
            } else {
                buttonElement.classList.remove('hover:bg-indigo-50');
                buttonElement.classList.add('bg-red-100', 'border-red-500', 'text-red-800');
                Array.from(container.children)[q.correct].classList.add('bg-green-100', 'border-green-500', 'text-green-800');
            }

            setTimeout(() => {
                currentIdx++;
                showQuestion();
            }, 1200);
        }

        function showResults() {
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('result-card').classList.remove('hidden');
            const ball = (correctAnswers / questions.length) * 40;
            document.getElementById('result-score').innerText = `To'g'ri javoblar: ${correctAnswers} / ${questions.length}`;
            document.getElementById('result-ball').innerText = `Ball: ${ball.toFixed(1)}/40`;
        }

        function exitQuiz() {
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('result-card').classList.add('hidden');
            document.getElementById('setup-card').classList.remove('hidden');
        }

        loadSubjects();
    </script>
</body>
</html>
